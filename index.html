<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz 7 Hằng Đẳng Thức Đáng Nhớ - Tự Luận</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-card">
        <div class="header">
            <h2>Trắc nghiệm Hằng Đẳng Thức 1.5</h2>
            <div class="stats" id="stats">Số câu đúng: 0/0 (0%)</div>
        </div>
        
        <div class="question-box" id="question">Đang tải câu hỏi...</div>
        
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Nhập kết quả thu gọn hoặc khai triển..." autocomplete="off">
            
            <div class="preview-box" id="preview-box">
                Xem trước: <span id="preview-text"><i>Chưa nhập gì...</i></span>
            </div>
            
            <div class="math-keyboard">
                <button class="kbd-btn" data-char="+">+</button>
                <button class="kbd-btn" data-char="-">-</button>
                <button class="kbd-btn" data-char="^">^ (Mũ)</button>
                <button class="kbd-btn" data-char="(">(</button>
                <button class="kbd-btn" data-char=")">)</button>
                <button class="kbd-btn" id="clear-btn">Xóa</button>
            </div>
        </div>

        <div class="controls">
            <button class="check-btn" id="check-btn">Kiểm tra ❯</button>
            <button class="next-btn" id="next-btn">Câu tiếp theo ❯</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
